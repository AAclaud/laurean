<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Punto de Venta — LAUREAN</title>
  <link rel="icon" type="image/svg+xml" href="images/brand/favicon.svg" />
  <link rel="preload" href="/fonts/cormorant-garamond-400-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/dm-sans-400-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/brand.css" />
  <link rel="stylesheet" href="css/cursor.css" />
  <script defer src="js/brand-img.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Paleta y tipografías en css/brand.css. Aquí solo vars del POS. */
      --green:    #388E3C;
      --red:      #c62828;
      --amber:    #D4A017;
      --blue:     #1565C0;
      --topbar-h: 52px;
      --sidebar-w: 280px;
    }
    html, body { height: 100%; font-family: var(--fb); background: var(--crema); color: var(--carbon); }

    /* ─── LOGIN ───────────────────────────────────────────────── */
    #pos-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--carbon);
    }
    .login-box {
      width: 360px;
      padding: 48px 40px;
      background: var(--crema);
    }
    .login-brand {
      margin-bottom: 10px;
      display: block;
    }
    .login-brand img {
      height: 32px;
      width: auto;
      display: block;
    }
    .login-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 36px;
    }
    .lf-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 7px;
    }
    .lf-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--piedra);
      border-radius: 4px;
      background: white;
      font-family: var(--fb);
      font-size: 15px;
      color: var(--carbon);
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    .lf-input:focus { border-color: var(--carbon); }
    .lf-error {
      font-size: 13px;
      color: var(--red);
      margin-bottom: 12px;
      min-height: 18px;
    }
    .lf-btn {
      width: 100%;
      padding: 14px;
      background: var(--carbon);
      color: var(--crema);
      font-family: var(--fb);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .lf-btn:hover { opacity: 0.82; }

    /* ─── APP SHELL ───────────────────────────────────────────── */
    #pos-app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
    #pos-app.visible { display: flex; }

    /* Topbar */
    .pos-topbar {
      height: var(--topbar-h);
      flex-shrink: 0;
      background: var(--carbon);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 50;
    }
    .pos-brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      transition: opacity .2s var(--ease);
    }
    .pos-brand:hover { opacity: 0.75; }
    .pos-brand img {
      height: 28px;
      width: auto;
      display: block;
    }
    .pos-brand-sub {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-left: 4px;
    }
    .pos-topbar-tabs {
      display: flex;
      gap: 4px;
      margin-left: 32px;
    }
    .pos-tab {
      padding: 7px 18px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-family: var(--fb);
      transition: color 0.2s, border-color 0.2s;
    }
    .pos-tab:hover  { color: rgba(255,255,255,0.8); }
    .pos-tab.active { color: white; border-bottom-color: white; }
    .pos-topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pos-user-chip {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
    }
    .pos-user-chip strong { color: white; font-weight: 500; }
    .pos-logout {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.55);
      font-family: var(--fb);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pos-logout:hover { color: white; border-color: rgba(255,255,255,0.5); }

    /* Content area */
    .pos-content { display: flex; flex: 1; overflow: hidden; }

    /* ─── SCREENS ─────────────────────────────────────────────── */
    .pos-screen { display: none; flex: 1; overflow: hidden; }
    .pos-screen.active { display: flex; }

    /* ─── VENTA SCREEN ────────────────────────────────────────── */
    #screen-venta { gap: 0; }

    /* Catálogo */
    .pos-catalog {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--piedra);
    }
    .pos-cat-filter {
      padding: 14px 20px;
      border-bottom: 1px solid var(--piedra);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: white;
    }
    .pos-filter-btn {
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--piedra);
      color: var(--warm-mid);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--fb);
      transition: background 0.2s, color 0.2s;
    }
    .pos-filter-btn.active { background: var(--carbon); color: white; }
    .pos-cat-search {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid var(--piedra);
      background: var(--crema);
      font-family: var(--fb);
      font-size: 14px;
      color: var(--carbon);
      outline: none;
      min-width: 180px;
    }
    .pos-cat-search { border-radius: 4px; }
    .pos-cat-search:focus { border-color: var(--carbon); }
    .pos-product-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      align-content: start;
    }
    .pos-prod-card {
      position: relative;
      background: white;
      border: 1px solid var(--piedra);
      border-radius: 6px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .pos-prod-card:hover {
      border-color: var(--carbon);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .pos-prod-card:active { transform: scale(0.98); }
    .pos-prod-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--piedra);
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }
    .pos-prod-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--carbon);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .pos-prod-price {
      font-size: 12px;
      color: var(--warm-mid);
    }
    .pos-prod-badge-new {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 2;
      background: #C8A96E;
      color: white;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .pos-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 48px;
      color: var(--warm-mid);
      font-size: 14px;
    }

    /* Carrito */
    .pos-cart {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: white;
    }
    .pos-cart-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--piedra);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--warm-mid);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pos-cart-title {
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .pos-bar-summary,
    .pos-cart-chevron {
      display: none;
    }
    .pos-cart-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pos-cart-clear {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--warm-mid);
      cursor: pointer;
      letter-spacing: 0.08em;
      font-family: var(--fb);
      text-decoration: underline;
    }
    .pos-cart-items { flex: 1; overflow-y: auto; padding: 12px; }
    .pos-cart-empty { text-align: center; padding: 40px 16px; color: var(--warm-mid); font-size: 13px; }
    .pos-cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--piedra);
      gap: 8px;
    }
    .pos-ci-name { font-size: 13px; flex: 1; line-height: 1.3; }
    .pos-ci-price { font-size: 13px; color: var(--warm-mid); white-space: nowrap; }
    .pos-ci-qty {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pos-ci-qty-btn {
      width: 22px; height: 22px;
      background: var(--piedra);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: var(--fb);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .pos-ci-qty-btn:hover { background: var(--carbon); color: white; }
    .pos-ci-qty-num {
      font-size: 13px; width: 34px; text-align: center;
      background: transparent; border: 0; color: inherit;
      font-family: var(--fb); padding: 2px 0; -moz-appearance: textfield;
    }
    .pos-ci-qty-num:focus { outline: none; border-bottom: 1px solid var(--carbon); }
    .pos-ci-qty-num::-webkit-inner-spin-button, .pos-ci-qty-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* Cart footer */
    .pos-cart-footer {
      padding: 14px;
      border-top: 1px solid var(--piedra);
    }
    .pos-cart-subtotal {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--warm-mid);
      margin-bottom: 6px;
    }
    .pos-cart-disc {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--green);
      margin-bottom: 6px;
    }
    .pos-cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    /* Cliente y PIN */
    .pos-field-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 5px;
    }
    .pos-field-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--piedra);
      border-radius: 4px;
      font-family: var(--fb);
      font-size: 13px;
      color: var(--carbon);
      outline: none;
      margin-bottom: 10px;
    }
    .pos-field-input:focus { border-color: var(--carbon); }
    .pos-pin-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .pos-pin-row .pos-field-input { margin-bottom: 0; flex: 1; letter-spacing: 0.2em; }
    .pos-pin-check {
      padding: 8px 12px;
      background: var(--carbon);
      color: white;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      font-family: var(--fb);
    }
    .pos-pin-unlocked {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
    }
    .pos-pct-input {
      width: 70px;
      padding: 7px 8px;
      border: 1px solid var(--piedra);
      border-radius: 4px;
      font-family: var(--fb);
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    .pos-pct-apply {
      flex: 1;
      padding: 7px;
      background: var(--green);
      color: white;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      font-family: var(--fb);
    }
    .pos-pin-msg { font-size: 11px; color: var(--red); margin-bottom: 6px; }
    .pos-pay-methods {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pos-pay-btn {
      flex: 1;
      padding: 7px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--piedra);
      color: var(--warm-mid);
      border: none;
      cursor: pointer;
      font-family: var(--fb);
      transition: background 0.15s, color 0.15s;
    }
    .pos-pay-btn.active { background: var(--carbon); color: white; }
    .pos-cobrar-btn {
      width: 100%;
      padding: 14px;
      background: var(--carbon);
      color: white;
      font-family: var(--fb);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .pos-cobrar-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pos-cobrar-btn:hover:not(:disabled) { opacity: 0.82; }

    /* ─── HISTORIAL ───────────────────────────────────────────── */
    #screen-historial {
      flex-direction: column;
      overflow: hidden;
    }
    .pos-hist-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--piedra);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      background: white;
    }
    .pos-hist-title {
      font-family: var(--fd);
      font-size: 24px;
      font-weight: 300;
    }
    .pos-hist-sub { font-size: 13px; color: var(--warm-mid); }
    .pos-hist-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .pos-hist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .pos-hist-table th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--warm-mid);
      padding: 8px 12px;
      border-bottom: 1px solid var(--piedra);
    }
    .pos-hist-table td {
      padding: 12px;
      border-bottom: 1px solid var(--piedra);
    }
    .pos-hist-table tr:hover td { background: var(--crema); }
    .status-chip {
      display: inline-block;
      padding: 3px 8px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── CIERRE ──────────────────────────────────────────────── */
    #screen-cierre {
      flex-direction: column;
      overflow: hidden;
    }
    .pos-cierre-body { flex: 1; overflow-y: auto; padding: 32px 40px; }
    .pos-cierre-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .pos-kpi {
      background: white;
      border: 1px solid var(--piedra);
      padding: 24px 20px;
    }
    .pos-kpi-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 10px;
    }
    .pos-kpi-value {
      font-family: var(--fd);
      font-size: 32px;
      font-weight: 300;
      color: var(--carbon);
    }
    .pos-kpi-sub { font-size: 12px; color: var(--warm-mid); margin-top: 4px; }

    /* Toast */
    .pos-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--carbon);
      color: white;
      padding: 12px 24px;
      font-size: 13px;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    .pos-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── BODEGA SELECTOR ────────────────────────────────────────── */
    #pos-bodega-select {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--carbon);
    }
    .pbs-option {
      display: block;
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 10px;
      background: white;
      border: 2px solid var(--piedra);
      border-radius: 6px;
      font-family: var(--fb);
      font-size: 14px;
      color: var(--carbon);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pbs-option:hover { border-color: var(--carbon); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .pbs-option strong { display: block; font-weight: 500; }
    .pbs-option small  { color: var(--warm-mid); font-size: 12px; }

    /* ─── TOPBAR BODEGA BADGE ─────────────────────────────────────── */
    .pos-bodega-badge {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(212,160,23,0.18);
      color: var(--amber);
      padding: 4px 10px;
      border-radius: 10px;
    }

    /* ─── DISCOUNT CODE ROW ───────────────────────────────────────── */
    .pos-dsc-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .pos-dsc-row .pos-field-input { margin-bottom: 0; flex: 1; }
    .pos-dsc-apply {
      padding: 8px 12px;
      background: var(--carbon);
      color: white;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--fb);
      white-space: nowrap;
    }
    .pos-dsc-msg { font-size: 11px; margin-bottom: 6px; min-height: 16px; }

    /* Responsive */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100%; }
      #screen-venta { flex-direction: column; }
      .pos-catalog { flex: none; height: 55vh; border-right: none; border-bottom: 1px solid var(--piedra); }
      .pos-cart { width: 100%; height: 45vh; }
      .pos-topbar-tabs .pos-tab:nth-child(n+3) { display: none; }
    }

    @media (max-width: 1024px) {
      .pos-product-grid { padding-bottom: 96px; }
      .pos-cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        width: 100%;
        height: auto;
        max-height: 75vh;
        background: white;
        box-shadow: 0 -16px 40px rgba(0,0,0,0.18);
        border-top: 1px solid var(--piedra);
        transform: translateY(calc(100% - 56px));
        transition: transform .3s ease;
      }
      body.pos-cart-open .pos-cart { transform: translateY(0); }
      .pos-cart-header {
        min-height: 56px;
        padding: 0 16px;
        cursor: pointer;
        background: white;
        flex-shrink: 0;
      }
      .pos-cart-label { display: none; }
      .pos-bar-summary {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--carbon);
        font-size: 12px;
        letter-spacing: 0.02em;
        text-transform: none;
      }
      .pos-cart-chevron {
        display: inline-block;
        color: var(--warm-mid);
        font-size: 18px;
        line-height: 1;
        transition: transform .3s ease;
      }
      body.pos-cart-open .pos-cart-chevron { transform: rotate(180deg); }
      .pos-cart-items,
      .pos-cart-footer {
        min-height: 0;
        overflow-y: auto;
      }
      .pos-cart-items { flex: 1 1 auto; }
      .pos-cart-footer { flex-shrink: 1; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ LOGIN -->
<div id="pos-login">
  <div class="login-box">
    <div class="login-brand"><img src="images/brand/logo-navbar.svg" alt="Laurean" /></div>
    <div class="login-sub">Punto de Venta</div>
    <label class="lf-label" for="lf-email">Correo electrónico</label>
    <input class="lf-input" type="email" id="lf-email" placeholder="correo@ejemplo.com" autocomplete="email" />
    <label class="lf-label" for="lf-pass">Contraseña</label>
    <input class="lf-input" type="password" id="lf-pass" placeholder="••••••••" autocomplete="current-password" />
    <div class="lf-error" id="lf-error"></div>
    <button class="lf-btn" onclick="posLogin()">Ingresar al POS →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ BODEGA SELECTOR -->
<div id="pos-bodega-select" style="display:none">
  <div class="login-box">
    <div class="login-brand"><img src="images/brand/logo-navbar.svg" alt="Laurean" /></div>
    <div class="login-sub">Selecciona tu bodega</div>
    <div id="pbs-list"></div>
  </div>
</div>

<!-- Auth & Data -->
<script src="js/config.js" onerror="console.info('[pos] js/config.js no existe; sin Supabase')"></script>
<script src="js/auth.js"></script>
<script src="data/products.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/catalog-loader.js"></script>
<script>
  // ─── State ─────────────────────────────────────────────────────────────────
  let POS_SESSION          = null;
  let posCart              = [];
  let posPayMethod         = 'efectivo';
  let posManualDisc        = 0;    // %
  let posActiveCat         = 'all';
  let POS_PRODUCTS         = [];   // flat array of all products
  let posAppliedDscCode    = null; // { id, code, discountGtq }

  document.addEventListener('laurean:catalog-ready', () => {
    refreshPosCatalog();
  });

  // ─── Login ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const s = getSession();
    if (s && ['vendedor','admin','superuser','bodega'].includes(s.role)) {
      if (s.canLoginPOS === false) {
        logout();
        document.getElementById('lf-error').textContent = 'Sin acceso al POS. Contacta al administrador.';
        return;
      }
      POS_SESSION = s;
      chooseBodegaThen(initPosApp);
    }
    document.getElementById('lf-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') posLogin();
    });
  });

  async function posLogin() {
    const email = document.getElementById('lf-email').value.trim();
    const pass  = document.getElementById('lf-pass').value;
    const errEl = document.getElementById('lf-error');
    errEl.textContent = '';
    if (!email || !pass) { errEl.textContent = 'Completa todos los campos.'; return; }

    // SEC: requiere Supabase Auth (sin fallback inseguro)
    if (window.LAUREAN_CONFIG && !window.LAUREAN_SUPABASE_READY) {
      await new Promise(r => {
        const t = setTimeout(r, 1500);
        document.addEventListener('laurean:supabase-ready', () => { clearTimeout(t); r(); }, { once: true });
      });
    }
    if (!window.LAUREAN_DB || typeof loginSupabase !== 'function') {
      errEl.textContent = 'Servidor no disponible. Recarga la página.';
      return;
    }

    const result = await loginSupabase(email, pass);
    if (!result.ok) {
      let msg = result.error || 'No se pudo iniciar sesión.';
      if (msg === 'Invalid login credentials') msg = 'Correo o contraseña incorrectos.';
      errEl.textContent = msg;
      return;
    }
    if (!['vendedor','admin','superuser','bodega'].includes(result.session.role)) {
      logout();
      errEl.textContent = 'Sin acceso al POS. Contacta al administrador.';
      return;
    }
    if (result.session.canLoginPOS === false) {
      logout();
      errEl.textContent = 'Sin acceso al POS. Contacta al administrador.';
      return;
    }
    POS_SESSION = result.session;
    chooseBodegaThen(initPosApp);
  }

  // ─── Bodega Selector ───────────────────────────────────────────────────────
  function chooseBodegaThen(initFn) {
    const s = POS_SESSION;
    const allBodegas = getBodegas ? getBodegas() : [];
    let candidates;
    if (s.role === 'admin' || s.role === 'superuser') {
      candidates = allBodegas;
    } else {
      const ids = s.bodegaIds || [];
      candidates = ids.length ? allBodegas.filter(b => ids.includes(b.id)) : allBodegas;
    }

    if (candidates.length === 0) {
      // No bodega constraint — go straight in
      initFn();
      return;
    }
    if (candidates.length === 1) {
      setActiveBodega(candidates[0].id);
      initFn();
      return;
    }

    // Multiple candidates: show selector
    document.getElementById('pos-login').style.display = 'none';
    const sel = document.getElementById('pos-bodega-select');
    sel.style.display = 'flex';
    document.getElementById('pbs-list').innerHTML = candidates.map(b => `
      <button class="pbs-option" onclick="pickBodega('${jsAttr(b.id)}')">
        <strong>${escapeHtml(b.name)}</strong>
        <small>${escapeHtml(b.address || b.location || '')}</small>
      </button>`).join('');
    // Store initFn for pickup
    window._posBodegaInitFn = initFn;
  }

  function pickBodega(id) {
    setActiveBodega(id);
    document.getElementById('pos-bodega-select').style.display = 'none';
    if (window._posBodegaInitFn) {
      const fn = window._posBodegaInitFn;
      window._posBodegaInitFn = null;
      fn();
    }
  }

  function posLogout() {
    logout();
    POS_SESSION = null;
    posCart = [];
    posAppliedDscCode = null;
    document.getElementById('pos-app').classList.remove('visible');
    document.getElementById('pos-bodega-select').style.display = 'none';
    document.getElementById('pos-login').style.display = 'flex';
  }

  // ─── Init App ──────────────────────────────────────────────────────────────
  function initPosApp() {
    document.getElementById('pos-login').style.display = 'none';
    if (typeof hydrateSiteSettings === 'function') hydrateSiteSettings();
    if (typeof syncCombosFromSupabase === 'function') syncCombosFromSupabase().then(ok => { if (ok && typeof renderPosProducts === 'function') renderPosProducts(); });
    if (typeof syncPriceOverridesFromSupabase === 'function') syncPriceOverridesFromSupabase().then(ok => { if (ok && typeof renderPosProducts === 'function') renderPosProducts(); });
    // Sincronización continua: precios/stock/combos cambiados en otro equipo llegan solos.
    if (typeof startLiveSync === 'function') {
      startLiveSync({
        tables: ['products', 'inventory_stock', 'price_overrides', 'combos', 'site_settings'],
        sync: [
          () => (typeof syncProductsFromSupabase === 'function' ? syncProductsFromSupabase() : null),
          () => (typeof syncStockFromSupabase === 'function' ? syncStockFromSupabase() : null),
          () => (typeof syncPriceOverridesFromSupabase === 'function' ? syncPriceOverridesFromSupabase() : null),
          () => (typeof syncCombosFromSupabase === 'function' ? syncCombosFromSupabase() : null),
        ],
      });
      document.addEventListener('laurean:live-synced', () => {
        const ae = document.activeElement;
        if (ae && ['INPUT', 'TEXTAREA', 'SELECT'].indexOf(ae.tagName) !== -1) return;
        if (typeof renderPosProducts === 'function') renderPosProducts();
      });
    }
    document.getElementById('pos-bodega-select').style.display = 'none';
    document.getElementById('pos-app').classList.add('visible');
    document.getElementById('pos-user-name').textContent = POS_SESSION.name.split(' ')[0];
    document.getElementById('pos-user-role').textContent = roleLabel(POS_SESSION.role);
    document.getElementById('hist-date-label').textContent = 'Hoy — ' + new Date().toLocaleDateString('es-GT', { day:'2-digit', month:'short', year:'numeric' });

    // Show active bodega in topbar
    const activeBodegaId = getActiveBodega();
    if (activeBodegaId) {
      const bodega = (getBodegas ? getBodegas() : []).find(b => b.id === activeBodegaId);
      if (bodega) {
        const badge = document.getElementById('pos-active-bodega');
        badge.textContent = bodega.name;
        badge.style.display = '';
      }
    }

    buildProductList();
    buildCatFilters();
    renderPosProducts();
    renderPosCart();
  }

  // ─── Products ──────────────────────────────────────────────────────────────
  function getPosProductsSnapshot() {
    const data = window.LAUREAN_DATA || {};
    if (!POS_SESSION) return [];
    const role     = POS_SESSION.role;
    const bodegaId = getActiveBodega();
    const priceRole = bodegaId ? 'bodega' : role;   // en el POS con bodega activa, el precio SIEMPRE es el de esa bodega (no el de vendedor)
    return [
      ...(data.products    || []),
      ...(data.sweaters    || []),
      ...(data.accessories || []),
      ...getCustomProducts(),
    ].map(p => ({
      ...p,
      displayPrice: getProductPrice(p.id, p.price_gtq || p.base_gtq || 0, p.price_usd || p.base_usd || 0, priceRole, bodegaId).gtq,
    }));
  }

  function buildProductList() {
    POS_PRODUCTS = getPosProductsSnapshot();
  }

  function buildCatFilters() {
    const data = window.LAUREAN_DATA;
    const cats = [...(data?.parentCategories || data?.categories || [])];
    document.getElementById('pos-cat-btns').innerHTML = cats.map(c =>
      `<button class="pos-filter-btn${c.id === posActiveCat ? ' active' : ''}" onclick="filterCat('${jsAttr(c.id)}')" id="pf-${c.id}">${escapeHtml(c.name)}</button>`
    ).join('');
    syncPosFilterState();
  }

  function syncPosFilterState() {
    document.querySelectorAll('.pos-filter-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('pf-' + posActiveCat);
    if (btn) btn.classList.add('active');
  }

  function refreshPosCatalog() {
    if (!POS_SESSION) return;
    buildProductList();
    buildCatFilters();
    renderPosProducts();
  }

  function filterCat(catId) {
    posActiveCat = catId;
    syncPosFilterState();
    renderPosProducts();
  }

  function _getPosVisibleCombos() {
    const session = POS_SESSION;
    if (!session) return [];
    const isAdmin = session.role === 'admin' || session.role === 'superuser';
    return getCombos().filter(c => {
      if (!c.active) return false;
      if (isAdmin) return true;
      const assigned = c.assignedTo || [];
      return assigned.includes('all') || assigned.includes('store') || assigned.includes('pos');
    });
  }

  function renderPosProducts() {
    const search = (document.getElementById('pos-search')?.value || '').toLowerCase();
    const grid   = document.getElementById('pos-product-grid');

    if (posActiveCat === '__combos__') {
      const combos = _getPosVisibleCombos();
      if (!combos.length) {
        grid.innerHTML = '<div class="pos-empty">No hay combos disponibles para esta sesión</div>'; return;
      }
      grid.innerHTML = combos.map(c => `
        <div class="pos-prod-card" onclick="posAddComboToCart('${jsAttr(c.id)}')"
             style="position:relative;border:2px solid var(--warm-dark, #531F23);">
          <div style="position:absolute;top:6px;left:6px;background:var(--warm-dark, #531F23);color:#fff;font-size:9px;padding:2px 7px;border-radius:10px;">COMBO</div>
          <div class="pos-prod-img brand-img">${c.image ? `<img class="brand-img-photo" src="${escapeAttr(c.image)}" alt="${escapeAttr(c.name)}" loading="lazy" />` : ''}</div>
          <div class="pos-prod-name">${escapeHtml(c.name)}</div>
          <div style="font-size:10px;color:var(--warm-mid);padding:0 8px 4px;">${(c.items||[]).length} productos</div>
          <div class="pos-prod-price">Q${(c.totalPrice_gtq||0).toLocaleString()}</div>
        </div>`).join('');
      if (window.LAUREAN_BRAND_IMG_SCAN) window.LAUREAN_BRAND_IMG_SCAN(grid);
      return;
    }

    buildProductList();
    let list = POS_PRODUCTS;
    if (posActiveCat !== 'all') {
      list = list.filter(p => p.parent === posActiveCat || p.category === posActiveCat);
    }
    if (search) {
      list = list.filter(p => p.name.toLowerCase().includes(search));
    }
    if (!list.length) {
      grid.innerHTML = '<div class="pos-empty">Sin productos</div>'; return;
    }
    grid.innerHTML = list.map(p => `
      <div class="pos-prod-card" onclick="posAddToCart('${jsAttr(p.id)}')">
        ${p.is_new_arrival ? '<div class="pos-prod-badge-new">New</div>' : ''}
        <div class="pos-prod-img brand-img">${p.image ? `<img class="brand-img-photo" src="${escapeAttr(p.image)}" alt="${escapeAttr(p.name)}" loading="lazy" decoding="async" />` : ''}</div>
        <div class="pos-prod-name">${escapeHtml(p.name)}</div>
        <div class="pos-prod-price">Q${p.displayPrice.toLocaleString()}</div>
      </div>`).join('');
    if (window.LAUREAN_BRAND_IMG_SCAN) window.LAUREAN_BRAND_IMG_SCAN(grid);
  }

  function posAddComboToCart(comboId) {
    const combo = getCombos().find(c => c.id === comboId);
    if (!combo || !combo.active) return;
    (combo.items || []).forEach(item => {
      const cartId   = item.productId + '_combo_' + comboId;
      const existing = posCart.find(i => i.id === cartId);
      if (existing) {
        existing.qty += (item.quantity || 1);
      } else {
        posCart.push({
          id:    cartId,
          name:  item.productName + ' (Combo: ' + combo.name + ')',
          price: item.comboPrice_gtq || 0,
          qty:   item.quantity || 1,
        });
      }
    });
    renderPosCart();
    showToast('Combo "' + combo.name + '" agregado');
  }

  // ─── Cart ──────────────────────────────────────────────────────────────────
  function posAddToCart(id) {
    const p = POS_PRODUCTS.find(x => x.id === id);
    if (!p) return;
    const existing = posCart.find(i => i.id === id);
    if (existing) { existing.qty++; }
    else          { posCart.push({ id: p.id, name: p.name, price: p.displayPrice, qty: 1 }); }
    renderPosCart();
    showToast(`${p.name} agregado`);
  }

  function posChangeQty(id, delta) {
    const item = posCart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) posCart = posCart.filter(i => i.id !== id);
    renderPosCart();
  }

  function posSetQty(id, val) {
    const item = posCart.find(i => i.id === id);
    if (!item) return;
    const n = parseInt(val, 10);
    if (!n || n <= 0) { posCart = posCart.filter(i => i.id !== id); }
    else { item.qty = n; }
    renderPosCart();
  }

  function posClearCart() {
    posCart = [];
    posManualDisc = 0;
    posAppliedDscCode = null;
    document.getElementById('pos-pin').value = '';
    document.getElementById('pos-pin-msg').textContent = '';
    document.getElementById('pos-pct-row').style.display = 'none';
    document.getElementById('pos-dsc-code').value = '';
    document.getElementById('pos-dsc-msg').textContent = '';
    renderPosCart();
  }

  function posToggleCartPanel() {
    if (!window.matchMedia('(max-width: 1024px)').matches) return;
    document.body.classList.toggle('pos-cart-open');
  }

  function renderPosCart() {
    const itemsEl   = document.getElementById('pos-cart-items');
    const subtotal  = posCart.reduce((s, i) => s + i.price * i.qty, 0);
    const manualAmt = posManualDisc > 0 ? Math.round(subtotal * posManualDisc / 100) : 0;
    const codeAmt   = posAppliedDscCode ? posAppliedDscCode.discountGtq : 0;
    const total     = Math.max(0, subtotal - manualAmt - codeAmt);
    const itemCount = posCart.reduce((s, i) => s + i.qty, 0);

    if (!posCart.length) {
      itemsEl.innerHTML = '<div class="pos-cart-empty">Agrega productos al carrito</div>';
    } else {
      itemsEl.innerHTML = posCart.map(i => `
        <div class="pos-cart-item">
          <div class="pos-ci-name">${escapeHtml(i.name)}</div>
          <div class="pos-ci-qty">
            <button class="pos-ci-qty-btn" onclick="posChangeQty('${jsAttr(i.id)}',-1)">−</button>
            <input class="pos-ci-qty-num" type="text" inputmode="numeric" value="${i.qty}"
                   onfocus="this.select()" onchange="posSetQty('${jsAttr(i.id)}', this.value)" aria-label="Cantidad" />
            <button class="pos-ci-qty-btn" onclick="posChangeQty('${jsAttr(i.id)}',1)">+</button>
          </div>
          <div class="pos-ci-price">Q${(i.price * i.qty).toLocaleString()}</div>
        </div>`).join('');
    }

    document.getElementById('pos-subtotal').textContent = 'Q' + subtotal.toLocaleString();
    const discRow = document.getElementById('pos-disc-row');
    const totalDisc = manualAmt + codeAmt;
    if (totalDisc > 0) {
      discRow.style.display = '';
      const labels = [];
      if (manualAmt > 0) labels.push(`${posManualDisc}% especial`);
      if (codeAmt   > 0) labels.push(`código ${posAppliedDscCode.code}`);
      document.getElementById('pos-disc-label').textContent = 'Descuento (' + labels.join(' + ') + ')';
      document.getElementById('pos-disc-amt').textContent   = '−Q' + totalDisc.toLocaleString();
    } else {
      discRow.style.display = 'none';
    }
    document.getElementById('pos-total').textContent = 'Q' + total.toLocaleString();
    document.getElementById('pos-bar-summary').textContent =
      `Cuenta · ${itemCount} ${itemCount === 1 ? 'item' : 'items'} — Q${total.toLocaleString()}`;

    const btn = document.getElementById('pos-cobrar-btn');
    btn.textContent = posCart.length ? `Cobrar Q${total.toLocaleString()}` : 'Cobrar Q0';
    btn.disabled    = posCart.length === 0;
  }

  // ─── PIN descuento ─────────────────────────────────────────────────────────
  function posCheckPin() {
    const pin    = document.getElementById('pos-pin').value;
    const msgEl  = document.getElementById('pos-pin-msg');
    const pctRow = document.getElementById('pos-pct-row');
    if (verifyDiscountPin(pin)) {
      msgEl.textContent  = '✓ PIN correcto';
      msgEl.style.color  = 'var(--green)';
      pctRow.style.display = 'flex';
    } else {
      msgEl.textContent  = 'PIN incorrecto';
      msgEl.style.color  = 'var(--red)';
      pctRow.style.display = 'none';
    }
  }

  function posApplyDiscount() {
    const pct = parseInt(document.getElementById('pos-pct').value, 10);
    if (!pct || pct < 1 || pct > 50) { alert('Ingresa entre 1 y 50.'); return; }
    posManualDisc = pct;
    renderPosCart();
    showToast(`Descuento del ${pct}% aplicado`);
  }

  function applyDiscountCodePOS() {
    const codeStr = (document.getElementById('pos-dsc-code').value || '').trim().toUpperCase();
    const msgEl   = document.getElementById('pos-dsc-msg');
    if (!codeStr) { msgEl.style.color = 'var(--red)'; msgEl.textContent = 'Ingresa un código.'; return; }

    const subtotal = posCart.reduce((s, i) => s + i.price * i.qty, 0);
    const result   = applyDiscountCode(codeStr, subtotal);
    if (!result.ok) {
      msgEl.style.color   = 'var(--red)';
      msgEl.textContent   = result.error || 'Código inválido.';
      posAppliedDscCode   = null;
      renderPosCart();
      return;
    }
    posAppliedDscCode = { id: result.code.id, code: result.code.code, discountGtq: result.discountGtq };
    msgEl.style.color = 'var(--green)';
    msgEl.textContent = `✓ Código aplicado — ahorro Q${result.discountGtq.toLocaleString()}`;
    renderPosCart();
    showToast(`Código ${codeStr} aplicado`);
  }

  // ─── Método de pago ────────────────────────────────────────────────────────
  function selectPayMethod(method) {
    posPayMethod = method;
    ['efectivo','tarjeta','qr'].forEach(m => {
      document.getElementById('pay-' + m).classList.toggle('active', m === method);
    });
  }

  // ─── Cobrar ────────────────────────────────────────────────────────────────
  function posCobrar() {
    if (!posCart.length) return;
    const subtotal  = posCart.reduce((s, i) => s + i.price * i.qty, 0);
    const manualAmt = posManualDisc > 0 ? Math.round(subtotal * posManualDisc / 100) : 0;
    const codeAmt   = posAppliedDscCode ? posAppliedDscCode.discountGtq : 0;
    const total     = Math.max(0, subtotal - manualAmt - codeAmt);
    const client    = document.getElementById('pos-client').value.trim() || 'Cliente POS';

    const activeBodegaId = getActiveBodega();
    const bodegas        = getBodegas ? getBodegas() : [];
    const activeBodega   = bodegas.find(b => b.id === activeBodegaId);

    const orderData = {
      userId:              POS_SESSION.userId,
      customerName:        client,
      customerPhone:       '',
      address:             'Venta POS directa',
      notes:               `Método: ${posPayMethod}`,
      items:               posCart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price_gtq: i.price })),
      subtotal_gtq:        subtotal,
      discount_gtq:        0,
      manual_discount_pct: posManualDisc,
      manual_discount_gtq: manualAmt,
      discountCode:        posAppliedDscCode ? posAppliedDscCode.code : null,
      discountCode_gtq:    codeAmt,
      total_gtq:           total,
      referral_code:       null,
      pay_method:          posPayMethod,
      channel:             'pos',
      origin:              'pos',
      bodegaId:            activeBodegaId || null,
      bodegaName:          activeBodega ? activeBodega.name : null,
    };
    createOrder(orderData);

    // Increment discount code usage after order is created
    if (posAppliedDscCode) {
      incrementCodeUsage(posAppliedDscCode.id);
    }

    showToast(`✓ Venta de Q${total.toLocaleString()} registrada`);
    posClearCart();
    document.getElementById('pos-client').value = '';
    posManualDisc = 0;
    posAppliedDscCode = null;
    document.getElementById('pos-pin').value = '';
    document.getElementById('pos-pin-msg').textContent = '';
    document.getElementById('pos-pct-row').style.display = 'none';
    document.getElementById('pos-pct').value = '';
    document.getElementById('pos-dsc-code').value = '';
    document.getElementById('pos-dsc-msg').textContent = '';
  }

  // ─── Historial ─────────────────────────────────────────────────────────────
  function renderHistorial() {
    const today     = new Date().toDateString();
    const bodegaId  = getActiveBodega();
    const orders = getOrders()
      .filter(o => {
        const isToday = new Date(o.createdAt).toDateString() === today;
        const isPos   = o.channel === 'pos' || o.origin === 'pos';
        if (!isToday && !isPos) return false;
        if (bodegaId && o.bodegaId && o.bodegaId !== bodegaId) return false;
        return true;
      })
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const tbody = document.getElementById('pos-hist-tbody');
    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--warm-mid)">Sin ventas hoy</td></tr>`;
      return;
    }
    tbody.innerHTML = orders.map(o => {
      const d    = new Date(o.createdAt);
      const hora = d.toLocaleTimeString('es-GT', { hour: '2-digit', minute: '2-digit' });
      const disc = (o.manual_discount_gtq || 0) + (o.discount_gtq || 0);
      return `<tr>
        <td>${escapeHtml(hora)}</td>
        <td style="font-size:11px;color:var(--warm-mid)">${escapeHtml(o.id.slice(-8))}</td>
        <td>${escapeHtml(o.customerName || '—')}</td>
        <td style="font-size:12px;color:var(--warm-mid)">${(o.items || []).length} items</td>
        <td><strong>Q${(o.total_gtq || 0).toLocaleString()}</strong></td>
        <td style="color:var(--green)">${disc > 0 ? '−Q' + disc.toLocaleString() : '—'}</td>
        <td style="font-size:12px">${escapeHtml(o.pay_method || '—')}</td>
        <td><span class="status-chip" style="background:${statusColor(o.status)}22;color:${statusColor(o.status)}">${escapeHtml(statusLabel(o.status))}</span></td>
      </tr>`;
    }).join('');
  }

  // ─── Cierre ────────────────────────────────────────────────────────────────
  function renderCierre() {
    const today    = new Date().toDateString();
    const bodegaId = getActiveBodega();
    const orders   = getOrders().filter(o => {
      if (new Date(o.createdAt).toDateString() !== today) return false;
      if (bodegaId && o.bodegaId && o.bodegaId !== bodegaId) return false;
      return true;
    });
    const done   = orders.filter(o => o.status !== 'cancelado');
    const total  = done.reduce((s, o) => s + (o.total_gtq || 0), 0);
    const disc   = done.reduce((s, o) => s + (o.manual_discount_gtq || 0) + (o.discount_gtq || 0) + (o.discountCode_gtq || 0), 0);

    document.getElementById('pos-cierre-kpis').innerHTML = [
      { label: 'Ventas del día', value: 'Q' + total.toLocaleString(), sub: done.length + ' transacciones' },
      { label: 'Descuentos otorgados', value: 'Q' + disc.toLocaleString(), sub: 'Total de descuentos' },
      { label: 'Canceladas', value: orders.length - done.length, sub: 'de ' + orders.length + ' total' },
      { label: 'Ticket promedio', value: done.length ? 'Q' + Math.round(total / done.length).toLocaleString() : '—', sub: 'Por transacción' },
    ].map(k => `
      <div class="pos-kpi">
        <div class="pos-kpi-label">${k.label}</div>
        <div class="pos-kpi-value">${k.value}</div>
        <div class="pos-kpi-sub">${k.sub}</div>
      </div>`).join('');
  }

  function exportPosCSV() {
    const today    = new Date().toDateString();
    const bodegaId = getActiveBodega();
    const orders   = getOrders().filter(o => {
      if (new Date(o.createdAt).toDateString() !== today) return false;
      if (bodegaId && o.bodegaId && o.bodegaId !== bodegaId) return false;
      return true;
    });
    const header = ['Hora','ID','Cliente','Total Q','Descuento Q','Código Descuento','Método','Estado','Bodega'];
    const rows   = orders.map(o => {
      const hora = new Date(o.createdAt).toLocaleTimeString('es-GT', { hour:'2-digit', minute:'2-digit' });
      const disc = (o.manual_discount_gtq || 0) + (o.discount_gtq || 0) + (o.discountCode_gtq || 0);
      return [hora, o.id.slice(-8), o.customerName || '—', o.total_gtq, disc, o.discountCode || '—', o.pay_method || '—', o.status, o.bodegaName || '—']
        .map(v => `"${v}"`).join(',');
    });
    const csv  = [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url;
    a.download = 'laurean-pos-' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  // ─── Screen switching ──────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.pos-screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'historial') renderHistorial();
    if (name === 'cierre')    renderCierre();
  }

  // ─── Toast ─────────────────────────────────────────────────────────────────
  let _toastTimer;
  function showToast(msg) {
    const el = document.getElementById('pos-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
  <script defer src="js/cursor.js"></script>
</body>
</html>
