<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAUREAN — Catálogo</title>
  <link rel="icon" type="image/svg+xml" href="images/brand/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/brand.css" />
  <link rel="stylesheet" href="css/cursor.css" />
  <script defer src="js/brand-img.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --nav-h: 80px; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--fb); font-size: 15px; line-height: 1.6; color: var(--carbon); background: var(--crema); overflow-x: hidden; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ─── Navbar ─── */
    .nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); z-index: 100;
           display: flex; align-items: center; justify-content: space-between; padding: 0 52px;
           background: rgba(241,236,232,0.92); backdrop-filter: blur(20px) saturate(1.2);
           -webkit-backdrop-filter: blur(20px) saturate(1.2); border-bottom: 1px solid rgba(142,56,51,0.08); }
    .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); display: inline-flex; align-items: center; z-index: 2; }
    .nav-logo img { height: 48px; width: auto; }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a { font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--carbon); opacity: 0.65; transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .nav-btn { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
    .nav-btn:hover { background: rgba(25,26,24,0.06); }
    .nav-btn svg { width: 20px; height: 20px; stroke: var(--carbon); fill: none; stroke-width: 1.4; }
    @media (max-width: 720px) { .nav { padding: 0 20px; } .nav-links { display: none; } }

    /* ─── Header ─── */
    .cat-head { padding: calc(var(--nav-h) + 56px) 52px 32px; max-width: 1280px; margin: 0 auto; }
    .cat-eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--vino); margin-bottom: 12px; }
    .cat-title { font-family: var(--fd); font-weight: 500; font-size: clamp(40px, 6vw, 68px); line-height: 1.02; letter-spacing: -0.01em; }
    .cat-title em { font-style: italic; }
    .cat-sub { margin-top: 16px; max-width: 560px; color: rgba(25,26,24,0.7); font-size: 15px; }

    /* ─── Controles ─── */
    .cat-controls { position: sticky; top: var(--nav-h); z-index: 20; background: rgba(241,236,232,0.92);
                    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                    padding: 16px 52px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
                    border-bottom: 1px solid rgba(142,56,51,0.08); }
    .cat-controls-inner { max-width: 1280px; margin: 0 auto; width: 100%; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .cat-input, .cat-select { font-family: inherit; font-size: 14px; padding: 10px 14px; border: 1px solid rgba(25,26,24,0.16);
                              border-radius: 10px; background: var(--white); color: var(--carbon); }
    .cat-input { flex: 1; min-width: 200px; }
    .cat-count { margin-left: auto; font-size: 13px; color: rgba(25,26,24,0.55); }
    @media (max-width: 720px) { .cat-head, .cat-controls { padding-left: 20px; padding-right: 20px; } .cat-count { margin-left: 0; } }

    /* ─── Agrupado por semana ─── */
    .cat-week-section { max-width: 1280px; margin: 0 auto; padding: 40px 52px 0; }
    .cat-week-title { font-family: var(--fd); font-size: 22px; font-weight: 500; color: var(--carbon);
                      margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid rgba(142,56,51,0.15); }
    .cat-week-title em { font-style: italic; color: var(--vino); }
    @media (max-width: 720px) { .cat-week-section { padding: 28px 20px 0; } }

    /* ─── Grid ─── */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; margin-bottom: 56px; }
    @media (max-width: 720px) { .cat-grid { gap: 18px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }

    .prod { background: var(--white); border-radius: 14px; overflow: hidden; border: 1px solid rgba(25,26,24,0.06);
            display: flex; flex-direction: column; transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease); cursor: pointer; }
    .prod:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(83,31,35,0.10); }
    .prod-img { aspect-ratio: 3/4; background: linear-gradient(135deg, var(--piedra), #ded7ce);
                display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-img-placeholder { font-family: var(--fd); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(83,31,35,0.32); }
    .prod-badge-new { position: absolute; top: 10px; left: 10px; background: var(--vino); color: var(--white);
                  font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 9px; border-radius: 20px; }
    .prod-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .prod-name { font-size: 13.5px; line-height: 1.35; color: var(--carbon); min-height: 36px; }
    .prod-price { font-family: var(--fd); font-size: 22px; font-weight: 500; color: var(--vino); }
    .prod-price small { font-family: var(--fb); font-size: 11px; color: rgba(25,26,24,0.5); font-weight: 400; }
    .prod-cta { margin-top: auto; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
                background: var(--vino); color: var(--white); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
                padding: 11px 14px; border-radius: 10px; transition: background 0.2s; width: 100%; }
    .prod-cta:hover { background: var(--vino-dk); }
    .prod-cta-contact { background: transparent; color: var(--vino); border: 1px solid var(--vino); }
    .prod-cta-contact:hover { background: var(--vino); color: var(--white); }
    .prod-btn-seller { margin-top: 6px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
                       color: rgba(25,26,24,0.5); text-decoration: underline; padding: 4px 0; display: block;
                       background: none; border: none; cursor: pointer; width: 100%; text-align: center; }
    .prod-btn-seller:hover { color: var(--vino); }
    .cat-empty { text-align: center; padding: 60px 0; color: rgba(25,26,24,0.5); }
    .cat-loading { text-align: center; padding: 80px 52px; color: rgba(25,26,24,0.45); font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ─── Footer ─── */
    footer { background: var(--carbon); color: rgba(255,255,255,0.7); padding: 72px 52px 36px; }
    .footer-top { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 56px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .footer-logo img { height: 30px; width: auto; display:block; }
    .footer-logo a { display:inline-block; transition: opacity .2s var(--ease); }
    .footer-logo a:hover { opacity: 0.7; }
    .footer-tagline { margin-top: 16px; font-size: 13.5px; max-width: 260px; line-height: 1.6; }
    .footer-col-title { color: var(--white); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 16px; }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-links a { font-size: 13.5px; color: rgba(255,255,255,0.7); transition: color 0.2s; }
    .footer-links a:hover { color: rgba(255,255,255,0.95); }
    .footer-bottom { max-width: 1280px; margin: 28px auto 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .footer-copy { font-size: 12px; color: rgba(255,255,255,0.5); }
    .footer-copy a { color: inherit; text-decoration: underline; opacity: 0.7; }
    .pay-badges { display: flex; align-items: center; gap: 10px; }
    .pay-badge { font-size: 10px; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.2); padding: 4px 9px; border-radius: 5px; }
    @media (max-width: 720px) { footer { padding: 52px 20px 28px; } .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; } .footer-bottom { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="nav">
    <a href="Laurean.html#inicio" class="nav-logo" aria-label="Laurean — Inicio">
      <img src="images/brand/logo-navbar.svg" alt="Laurean" />
    </a>
    <ul class="nav-links">
      <li><a href="Laurean.html#inicio">Inicio</a></li>
      <li><a href="catalogo.html" class="active">Tienda</a></li>
      <li><a href="Laurean.html#las-colecciones">Colecciones</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="nav-btn" aria-label="Iniciar sesión">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
    </div>
  </nav>

  <!-- Header -->
  <header class="cat-head">
    <p class="cat-eyebrow">Catálogo · Disponibilidad en bodega</p>
    <h1 class="cat-title">Todo lo que tenemos,<br><em>disponible</em> para ti.</h1>
    <p class="cat-sub">Explora el inventario disponible. Haz clic en cualquier producto para ver detalles y confirmar tu compra.</p>
  </header>

  <!-- Controles -->
  <div class="cat-controls">
    <div class="cat-controls-inner">
      <input type="search" id="cat-search" class="cat-input" placeholder="Buscar por nombre…" oninput="renderCatalog()" />
      <span class="cat-count" id="cat-count"></span>
    </div>
  </div>

  <!-- Contenido dinámico -->
  <main id="cat-main">
    <div class="cat-loading" id="cat-loading">Cargando catálogo…</div>
  </main>

  <!-- Footer (idéntico al de Laurean.html) -->
  <footer id="site-footer"></footer>

  <!-- Scripts (mismo orden que Laurean.html) -->
  <script src="js/config.js" onerror="console.info('[laurean] sin js/config.js — modo offline')"></script>
  <script src="js/auth.js"></script>
  <script src="data/products.js"></script>
  <script src="js/supabase-client.js"></script>
  <script defer src="js/visit-tracker.js"></script>
  <script src="js/catalog-loader.js"></script>

  <script>
    // ─── Utilidades ───────────────────────────────────────────────────────────
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // ─── Estado ───────────────────────────────────────────────────────────────
    var _allProducts = [];
    var _rendered    = false;

    // ─── Precio visible según sesión ─────────────────────────────────────────
    function getPriceDisplay(p) {
      if (!p.show_price || !(p.price_gtq > 0)) return null;
      var session = (typeof getSession === 'function') ? getSession() : null;
      var role    = session ? session.role : null;
      if (typeof getProductPrice === 'function' && role) {
        var pr = getProductPrice(p.id, p.price_gtq, p.price_usd, role);
        return pr ? pr.gtq : p.price_gtq;
      }
      return p.price_gtq;
    }

    // ─── Tarjeta de producto ──────────────────────────────────────────────────
    function buildCard(p) {
      var priceGtq  = getPriceDisplay(p);
      var hasPrice  = priceGtq != null;
      var imgTag    = p.image
        ? '<img class="brand-img-photo" src="' + esc(p.image) + '" alt="' + esc(p.name) + '" loading="lazy" />'
        : '';
      var badgeNew  = p.is_new_arrival ? '<span class="prod-badge-new">Nuevo</span>' : '';
      var priceHtml = hasPrice
        ? '<div class="prod-price">Q' + esc(String(priceGtq)) + ' <small>GTQ</small></div>'
        : '';
      var ctaLabel  = hasPrice ? 'Ver producto' : 'Contactar a Laurean';
      var ctaClass  = hasPrice ? 'prod-cta' : 'prod-cta prod-cta-contact';
      var ctaHref   = 'producto.html?id=' + encodeURIComponent(p.id);

      // Botón "Ver precio vendedor"
      var session   = (typeof getSession === 'function') ? getSession() : null;
      var sellerBtn = '';
      if (!hasPrice) {
        // Sin precio público: mostrar siempre el botón
        sellerBtn = '<button class="prod-btn-seller" onclick="handleVerPrecioVendedor(event, \'' + esc(p.id) + '\', ' + Number(p.price_gtq || 0) + ', ' + Number(p.price_usd || 0) + ')">Ver precio vendedor</button>';
      }

      return '<article class="prod" onclick="location.href=\'' + ctaHref + '\'">'
        + '<div class="prod-img brand-img">' + imgTag + badgeNew + '</div>'
        + '<div class="prod-body">'
        + '<div class="prod-name">' + esc(p.name) + '</div>'
        + priceHtml
        + '<a class="' + ctaClass + '" href="' + ctaHref + '" onclick="event.stopPropagation()">' + ctaLabel + '</a>'
        + sellerBtn
        + '</div></article>';
    }

    // ─── Ver precio vendedor ──────────────────────────────────────────────────
    function handleVerPrecioVendedor(event, id, baseGtq, baseUsd) {
      event.stopPropagation();
      var session = (typeof getSession === 'function') ? getSession() : null;
      if (!session) {
        window.location.href = 'vendedoras.html';
        return;
      }
      var pr = (typeof getProductPrice === 'function')
        ? getProductPrice(id, baseGtq, baseUsd, session.role)
        : { gtq: baseGtq, usd: baseUsd };
      alert('Precio vendedor: Q' + (pr ? pr.gtq : baseGtq) + ' GTQ');
    }

    // ─── Render principal ─────────────────────────────────────────────────────
    // Mezcla productos de Supabase/fallback + productos creados localmente en el
    // dashboard (getCustomProducts), deduplicando por id y normalizando category→parent.
    function catalogProducts() {
      var base   = (window.LAUREAN_DATA && window.LAUREAN_DATA.products) ? window.LAUREAN_DATA.products : [];
      var custom = (typeof getCustomProducts === 'function') ? getCustomProducts() : [];
      var byId = {};
      base.forEach(function(p) { byId[p.id] = p; });
      custom.forEach(function(cp) { byId[cp.id] = Object.assign({}, cp, { parent: cp.parent || cp.category }); });
      return Object.keys(byId).map(function(k) { return byId[k]; });
    }

    function renderCatalog() {
      var data = window.LAUREAN_DATA || {};

      var q    = (document.getElementById('cat-search').value || '').toLowerCase().trim();
      var list = catalogProducts().filter(function(p) {
        if (q && (p.name || '').toLowerCase().indexOf(q) === -1) return false;
        return true;
      });

      // Actualizar contador
      document.getElementById('cat-count').textContent = list.length + ' producto' + (list.length === 1 ? '' : 's');

      // Agrupación customer-facing: "Novedades" + por categoría.
      // (El período interno semana/mes es de uso exclusivo del dashboard;
      //  nunca se expone en el catálogo público.)
      var cats   = (data.parentCategories || []);
      var catName = {};
      cats.forEach(function(c) { catName[c.id] = c.name; });

      var novedades = list.filter(function(p) { return p.is_new_arrival; });
      var byCat = {};      // parent id → [products]
      var sinCat = [];
      list.forEach(function(p) {
        if (p.is_new_arrival) return;            // ya va en Novedades
        var pid = p.parent;
        if (pid != null && catName[pid] != null) {
          if (!byCat[pid]) byCat[pid] = [];
          byCat[pid].push(p);
        } else {
          sinCat.push(p);
        }
      });

      function section(title, arr) {
        if (!arr.length) return '';
        return '<div class="cat-week-section">'
          + '<h2 class="cat-week-title"><em>' + esc(title) + '</em></h2>'
          + '<div class="cat-grid">' + arr.map(buildCard).join('') + '</div>'
          + '</div>';
      }

      var html = '';
      if (!list.length) {
        html = '<div class="cat-week-section"><div class="cat-empty">No encontramos productos con ese criterio.</div></div>';
      } else {
        html += section('Novedades', novedades);
        // Categorías en su orden definido
        cats.forEach(function(c) { html += section(c.name, byCat[c.id] || []); });
        html += section('Disponibles', sinCat);
      }

      var main = document.getElementById('cat-main');
      main.innerHTML = html;
      if (window.LAUREAN_BRAND_IMG_SCAN) window.LAUREAN_BRAND_IMG_SCAN(main);
    }

    // ─── Escuchar catalog-ready ───────────────────────────────────────────────
    document.addEventListener('laurean:catalog-ready', function(e) {
      document.getElementById('cat-loading').style.display = 'none';
      _allProducts = catalogProducts();
      renderCatalog();
    });
  </script>
  <script src="js/site-footer.js"></script>
  <script defer src="js/cursor.js"></script>
</body>
</html>
